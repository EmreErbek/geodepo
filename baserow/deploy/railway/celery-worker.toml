# Railway > Celery Worker
# Servis ayarlari:
#   Root Directory: baserow
#   Config File:    /deploy/railway/celery-worker.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway-backend"
dockerTarget = "railway-worker"
watchPatterns = [
  "backend/**",
  "Dockerfile.railway-backend",
  "deploy/**",
]
buildArgs = { SOURCE_REVISION = "celery-worker-fix-7" }

[deploy]
# Async job'lar (publish, import vb.) "export" kuyruguna gider.
# Railway env: BASEROW_RUN_MINIMAL=true + BASEROW_AMOUNT_OF_WORKERS=1 -> combined mode.
# Ayar: scripts/configure-geodepo-celery-worker.ps1
startCommand = "celery-worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5