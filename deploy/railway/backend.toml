# Railway > Baserow Backend
# Servis ayarlari:
#   Root Directory: baserow
#   Config File:    /deploy/railway/backend.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway-backend"
dockerTarget = "railway"
watchPatterns = [
  "backend/**",
  "Dockerfile.railway-backend",
  "deploy/**",
]

[deploy]
healthcheckPath = "/api/_health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
