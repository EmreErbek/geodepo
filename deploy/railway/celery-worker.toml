# Railway > Celery Worker
# Servis ayarlari:
#   Root Directory: baserow
#   Config File:    /deploy/railway/celery-worker.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway-backend"
dockerTarget = "railway-worker"
watchPatterns = [
  "backend/**",
  "Dockerfile.railway-backend",
  "deploy/**",
]
buildArgs = { SOURCE_REVISION = "celery-worker-fix-4" }

[deploy]
startCommand = "celery-worker-railway"
healthcheckPath = "/api/_health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
