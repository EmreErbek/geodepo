# Railway > Baserow Frontend
# Servis ayarlari:
#   Root Directory: baserow
#   Config File:    /deploy/railway/frontend.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway-frontend"
watchPatterns = [
  "web-frontend/**",
  "premium/web-frontend/**",
  "enterprise/web-frontend/**",
  "deploy/**",
]

[deploy]
healthcheckPath = "/_health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5