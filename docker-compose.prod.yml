# VPS / dis sunucu referansi (Railway disi).
# Railway icin deploy/railway/*.toml dosyalarini kullanin.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: baserow
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: baserow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./baserow
      dockerfile: backend/Dockerfile
      target: prod
    environment:
      SECRET_KEY: ${SECRET_KEY}
      BASEROW_PUBLIC_URL: ${BASEROW_PUBLIC_URL}
      DATABASE_HOST: postgres
      DATABASE_NAME: baserow
      DATABASE_USER: baserow
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      BASEROW_AMOUNT_OF_WORKERS: 1
      BASEROW_AMOUNT_OF_GUNICORN_WORKERS: 2
      BASEROW_TRIGGER_SYNC_TEMPLATES_AFTER_MIGRATION: "false"
    ports:
      - "8080:8000"
    volumes:
      - baserow_media:/baserow/media
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web-frontend:
    build:
      context: ./baserow
      dockerfile: web-frontend/Dockerfile
      target: prod
    environment:
      BASEROW_PUBLIC_URL: ${BASEROW_PUBLIC_URL}
      PRIVATE_BACKEND_URL: http://backend:8000
      PUBLIC_BACKEND_URL: ${BASEROW_PUBLIC_URL}
      PUBLIC_WEB_FRONTEND_URL: ${BASEROW_PUBLIC_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  baserow_media: